<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Verbo Code — Verbo AI</title>
  <link rel="icon" href="/favicon.ico">
  <!-- Cargar style.css de Verbo AI PRIMERO (tiene los fondos y variables) -->
  <link rel="stylesheet" href="/style.css">
  <link rel="stylesheet" href="/verbocode/shared.css">
  <link rel="stylesheet" href="/verbocode/home.css">
</head>
<body class="vc-page">
  <!-- Header -->
  <header class="vc-header">
    <div class="vc-header-left">
      <a href="/" class="vc-back-btn" title="Volver a Verbo AI">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </a>
      <div class="vc-logo">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2"><path d="m16 18 6-6-6-6M8 6l-6 6 6 6" stroke-linecap="round" stroke-linejoin="round"/></svg>
        <span>Verbo Code</span>
      </div>
    </div>
    <div class="vc-header-right">
      <div class="vc-perfil" id="vcPerfil">
        <div class="vc-perfil-avatar" id="vcPerfilAvatar">?</div>
        <span id="vcPerfilNombre">Cargando...</span>
      </div>
    </div>
  </header>

  <!-- Main -->
  <main class="vc-main">
    <div class="vc-section-header">
      <h1 class="vc-title">Mis proyectos</h1>
      <button id="btnNuevoProyecto" class="vc-btn-primary">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14" stroke-linecap="round"/></svg>
        Nuevo proyecto
      </button>
    </div>

    <div id="vcProyectos" class="vc-proyectos-grid">
      <!-- Loading state -->
      <div class="vc-loading">
        <div class="vc-spinner"></div>
        <p>Cargando proyectos...</p>
      </div>
    </div>

    <div id="vcVacio" class="vc-vacio oculto">
      <svg viewBox="0 0 24 24" width="64" height="64" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 7v10a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V7M3 7l9-4 9 4M3 7l9 4 9-4M12 11v8" stroke-linecap="round" stroke-linejoin="round"/></svg>
      <h2>Aún no tenés proyectos</h2>
      <p>Hacé clic en "Nuevo proyecto" para empezar a crear con la IA.</p>
    </div>
  </main>

  <!-- Modal crear proyecto -->
  <div id="modalNuevoProyecto" class="vc-modal oculto">
    <div class="vc-modal-backdrop"></div>
    <div class="vc-modal-content">
      <h2 class="vc-modal-title">Crear nuevo proyecto</h2>
      <p class="vc-modal-desc">Poné un nombre a tu proyecto. Después podés cambiarlo o eliminarlo.</p>
      <input type="text" id="inputNombreProyecto" class="vc-input" placeholder="Ej: Mi landing page, Addon Minecraft, App React..." maxlength="60" autocomplete="off">
      <div class="vc-modal-actions">
        <button id="btnCancelarProyecto" class="vc-btn-ghost">Cancelar</button>
        <button id="btnCrearProyecto" class="vc-btn-primary" disabled>Crear proyecto</button>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div id="vcToast" class="vc-toast oculto"></div>

  <script src="/verbocode/home.js"></script>
</body>
</html>
